<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Caisse Solidaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <span class="text-4xl">🪙</span>
            <h1 class="text-2xl font-black text-gray-900 mt-2">CaisseSolidaire</h1>
            <p class="text-sm text-gray-500 mt-1">Connectez-vous pour accéder à l'application</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4 font-medium border border-red-100 text-center">
            Identifiant ou mot de passe incorrect.
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider">Nom d'utilisateur</label>
                <input type="text" name="username" required autocomplete="username"
                       class="w-full mt-1 p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider">Mot de passe</label>
                <input type="password" name="password" required autocomplete="current-password"
                       class="w-full mt-1 p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-blue-200">
                Se connecter
            </button>
        </form>
    </div>

</body>
</html>
